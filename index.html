<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Sia's Videos</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ============ GRID (child home) ============ -->
  <section id="screen-grid" class="screen active">
    <header class="topbar">
      <h1 class="brand">Sia's Videos</h1>
      <!-- visible button to reach the PIN-protected parent area -->
      <button id="parent-btn" class="parent-btn" aria-label="Grown-up settings">⋮</button>
    </header>
    <div id="grid" class="grid"></div>
    <div id="grid-empty" class="empty hidden">
      <div class="empty-emoji">📺</div>
      <p>No videos yet.<br>Ask a grown-up to add some!</p>
    </div>
  </section>

  <!-- ============ PLAYER ============ -->
  <section id="screen-player" class="screen">
    <!-- floating toggle: rotate the video to landscape so it fills the screen -->
    <button id="btn-rotate" class="rotate-btn" aria-label="Rotate video">🔄</button>
    <div class="player-wrap">
      <div id="yt"></div>
      <!-- transparent shield: blocks YouTube links; swipe = change video, tap = play/pause -->
      <div id="tap-shield" class="tap-shield"></div>
      <div id="player-error" class="player-error hidden">
        <p>😕 This video can't play here.<br>Swipe up for another one.</p>
      </div>
    </div>
    <div class="player-bar">
      <button id="btn-back" class="pbtn" aria-label="Back to list">⬅️</button>
      <button id="btn-playpause" class="pbtn" aria-label="Play or pause">⏸️</button>
      <button id="btn-next" class="pbtn" aria-label="Next video">⏭️</button>
    </div>
  </section>

  <!-- ============ PARENT ============ -->
  <section id="screen-parent" class="screen">
    <!-- PIN view -->
    <div id="pin-view" class="pin-view">
      <h2 id="pin-title">Enter PIN</h2>
      <div id="pin-dots" class="pin-dots"></div>
      <p id="pin-msg" class="pin-msg"></p>
      <div class="pin-pad"></div>
      <button id="pin-cancel" class="text-btn">Cancel</button>
    </div>

    <!-- Manager view -->
    <div id="manager-view" class="manager-view hidden">
      <header class="topbar">
        <h2 class="brand">Manage videos</h2>
        <button id="parent-done" class="text-btn">Done</button>
      </header>
      <div class="add-row">
        <input id="add-url" type="url" inputmode="url" autocomplete="off"
               autocapitalize="off" spellcheck="false"
               placeholder="Paste a YouTube link">
        <button id="add-btn">Add</button>
      </div>
      <p id="add-msg" class="add-msg"></p>
      <ul id="manage-list" class="manage-list"></ul>
      <div class="manager-footer">
        <button id="change-pin" class="text-btn">Change PIN</button>
        <button id="update-app" class="text-btn">🔄 Update app</button>
        <!-- shown only when the browser reports the app is installable -->
        <button id="install-app" class="text-btn hidden">📲 Install app</button>
      </div>
    </div>
  </section>

  <!-- YouTube IFrame Player API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
